version: '3.8'

services:
  # ============================================
  # Infrastructure Services
  # ============================================
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - tradecards-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - tradecards-network

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: meu_banco
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tradecards-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - tradecards-network

  # ============================================
  # Microservices
  # ============================================
  # 
  # order-service: Manages orders and publishes order.created events
  # Port: 8081
  # Build: cd services/order-service && mvn clean package
  # Run: java -jar services/order-service/target/order-service-0.0.1-SNAPSHOT.jar
  #
  # To add new services, follow the pattern:
  # service-name:
  #   build:
  #     context: ./services/service-name
  #     dockerfile: Dockerfile
  #   container_name: service-name
  #   ports:
  #     - "PORT:PORT"
  #   depends_on:
  #     - kafka
  #     - postgres
  #   environment:
  #     - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
  #     - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/meu_banco
  #   networks:
  #     - tradecards-network

networks:
  tradecards-network:
    driver: bridge

volumes:
  postgres_data: